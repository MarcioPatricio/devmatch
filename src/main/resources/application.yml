spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/devmatch_db
    username: postgres
    password: postgres

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  flyway:
    enabled: true

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

server:
  port: 8080

logging:
  level:
    org.springframework.security: INFO
    org.springdoc: DEBUG